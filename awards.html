<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awards | Louie Cabardo</title>
    <link rel="icon" type="image/png" href="images/round-profile.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&family=Space+Mono&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    },
                    colors: {
                        slate: { 850: '#151e32', 900: '#0f172a', 950: '#020617' },
                        accent: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-950 text-slate-300 font-sans antialiased selection:bg-accent-500 selection:text-white min-h-screen">
    <main class="relative overflow-hidden">
        <div class="fixed inset-0 z-0 pointer-events-none">
            <div class="absolute top-[-12%] left-[-12%] w-[460px] h-[460px] bg-accent-500/10 rounded-full blur-[110px]">
            </div>
            <div
                class="absolute bottom-[-10%] right-[-8%] w-[420px] h-[420px] bg-amber-500/10 rounded-full blur-[120px]">
            </div>
        </div>

        <section class="relative z-10 max-w-6xl mx-auto px-6 py-14 sm:py-20">
            <div class="mb-10">
                <a href="index.html#projects"
                    class="inline-flex items-center gap-2 text-sm font-semibold text-slate-400 hover:text-white transition-colors mb-8">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                    Back to Portfolio
                </a>
                <p class="text-sm font-mono uppercase tracking-widest text-accent-400 mb-4">Awards</p>
                <h1 class="text-4xl sm:text-6xl font-heading font-extrabold text-white mb-6">Graduation recognitions and
                    capstone honors.</h1>
                <p class="max-w-2xl text-slate-400 text-lg leading-relaxed">
                    These awards mark my BSIT journey, internship performance, and the work behind my featured capstone
                    project.
                </p>
            </div>

            <div class="grid lg:grid-cols-2 gap-6 mb-10">
                <button onclick="openAwardImage('images/Awards.jpg')"
                    class="group text-left bg-slate-900/70 border border-white/10 rounded-3xl overflow-hidden shadow-2xl hover:border-accent-400/40 transition-all">
                    <img src="images/Awards.jpg" alt="Louie Cabardo awards"
                        class="w-full h-[320px] sm:h-[420px] object-cover object-center group-hover:scale-[1.03] transition-transform duration-500">
                </button>
                <button onclick="openAwardImage('images/Awards-with-Diploma.jpg')"
                    class="group text-left bg-slate-900/70 border border-white/10 rounded-3xl overflow-hidden shadow-2xl hover:border-accent-400/40 transition-all">
                    <img src="images/Awards-with-Diploma.jpg" alt="Louie Cabardo awards with diploma"
                        class="w-full h-[320px] sm:h-[420px] object-cover object-center group-hover:scale-[1.03] transition-transform duration-500">
                </button>
            </div>

            <section class="mb-10" aria-labelledby="award-gallery-title">
                <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 mb-6">
                    <div>
                        <p class="text-xs font-mono uppercase tracking-[0.25em] text-accent-400 mb-2">Individual
                            recognition</p>
                        <h2 id="award-gallery-title" class="text-3xl font-heading font-bold text-white">Award Gallery
                        </h2>
                    </div>
                    <p class="text-sm text-slate-500">Select an award to view it in full.</p>
                </div>

                <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <button onclick="openAwardImage('images/awards/capstone%20of%20the%20year%20(HD).png')"
                        class="group text-left overflow-hidden rounded-3xl border border-white/10 bg-slate-900/70 shadow-xl transition-all duration-300 hover:-translate-y-1 hover:border-accent-400/50 hover:shadow-accent-500/10">
                        <div class="relative overflow-hidden aspect-[4/3]"><img
                                src="images/awards/capstone%20of%20the%20year%20(HD).png"
                                alt="Capstone Project of the Year certificate"
                                class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"><span
                                class="absolute bottom-3 right-3 rounded-full bg-slate-950/85 px-3 py-1.5 text-xs font-semibold text-white opacity-0 transition-opacity group-hover:opacity-100">Expand</span>
                        </div>
                        <div class="p-5">
                            <h3 class="font-heading text-lg font-bold text-white leading-snug">Capstone Project of the
                                Year</h3>
                            <p class="mt-2 text-sm text-slate-400">Abuyog Community College</p>
                        </div>
                    </button>
                    <button onclick="openAwardImage('images/awards/panelists%20choice%20(HD).png')"
                        class="group text-left overflow-hidden rounded-3xl border border-white/10 bg-slate-900/70 shadow-xl transition-all duration-300 hover:-translate-y-1 hover:border-accent-400/50 hover:shadow-accent-500/10">
                        <div class="relative overflow-hidden aspect-[4/3]"><img
                                src="images/awards/panelists%20choice%20(HD).png" alt="Panelist's Choice certificate"
                                class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"><span
                                class="absolute bottom-3 right-3 rounded-full bg-slate-950/85 px-3 py-1.5 text-xs font-semibold text-white opacity-0 transition-opacity group-hover:opacity-100">Expand</span>
                        </div>
                        <div class="p-5">
                            <h3 class="font-heading text-lg font-bold text-white leading-snug">Panelist's Choice Award
                            </h3>
                            <p class="mt-2 text-sm text-slate-400">Abuyog Community College</p>
                        </div>
                    </button>
                    <button onclick="openAwardImage('images/awards/best%20in%20presentation%20(HD).png')"
                        class="group text-left overflow-hidden rounded-3xl border border-white/10 bg-slate-900/70 shadow-xl transition-all duration-300 hover:-translate-y-1 hover:border-accent-400/50 hover:shadow-accent-500/10">
                        <div class="relative overflow-hidden aspect-[4/3]"><img
                                src="images/awards/best%20in%20presentation%20(HD).png"
                                alt="Best in Presentation certificate"
                                class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"><span
                                class="absolute bottom-3 right-3 rounded-full bg-slate-950/85 px-3 py-1.5 text-xs font-semibold text-white opacity-0 transition-opacity group-hover:opacity-100">Expand</span>
                        </div>
                        <div class="p-5">
                            <h3 class="font-heading text-lg font-bold text-white leading-snug">Best in Presentation</h3>
                            <p class="mt-2 text-sm text-slate-400">Abuyog Community College</p>
                        </div>
                    </button>
                    <button onclick="openAwardImage('images/awards/best%20lead%20programmer%20(HD).png')"
                        class="group text-left overflow-hidden rounded-3xl border border-white/10 bg-slate-900/70 shadow-xl transition-all duration-300 hover:-translate-y-1 hover:border-accent-400/50 hover:shadow-accent-500/10">
                        <div class="relative overflow-hidden aspect-[4/3]"><img
                                src="images/awards/best%20lead%20programmer%20(HD).png"
                                alt="Best Lead Programmer certificate"
                                class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"><span
                                class="absolute bottom-3 right-3 rounded-full bg-slate-950/85 px-3 py-1.5 text-xs font-semibold text-white opacity-0 transition-opacity group-hover:opacity-100">Expand</span>
                        </div>
                        <div class="p-5">
                            <h3 class="font-heading text-lg font-bold text-white leading-snug">Best Lead Programmer</h3>
                            <p class="mt-2 text-sm text-slate-400">Abuyog Community College</p>
                        </div>
                    </button>
                    <button onclick="openAwardImage('images/awards/internship%20excellence%20(HD).png')"
                        class="group text-left overflow-hidden rounded-3xl border border-white/10 bg-slate-900/70 shadow-xl transition-all duration-300 hover:-translate-y-1 hover:border-accent-400/50 hover:shadow-accent-500/10">
                        <div class="relative overflow-hidden aspect-[4/3]"><img
                                src="images/awards/internship%20excellence%20(HD).png"
                                alt="Internship Excellence certificate"
                                class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105"><span
                                class="absolute bottom-3 right-3 rounded-full bg-slate-950/85 px-3 py-1.5 text-xs font-semibold text-white opacity-0 transition-opacity group-hover:opacity-100">Expand</span>
                        </div>
                        <div class="p-5">
                            <h3 class="font-heading text-lg font-bold text-white leading-snug">Internship Excellence
                                Award</h3>
                            <p class="mt-2 text-sm text-slate-400">Abuyog Community College</p>
                        </div>
                    </button>
                </div>
            </section>

        </section>
    </main>

    <div id="award-lightbox"
        class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/95 p-4 backdrop-blur-md">
        <button onclick="closeAwardImage()"
            class="absolute top-5 right-5 rounded-full bg-slate-800/80 p-3 text-slate-300 hover:text-white hover:bg-slate-700 transition-colors">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <img id="award-lightbox-img" src="" alt="Award full view"
            class="max-h-[88vh] max-w-full rounded-2xl border border-slate-700 object-contain shadow-2xl">
    </div>

    <script>
        function openAwardImage(src) {
            const lightbox = document.getElementById('award-lightbox');
            document.getElementById('award-lightbox-img').src = src;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeAwardImage() {
            const lightbox = document.getElementById('award-lightbox');
            lightbox.classList.add('hidden');
            lightbox.classList.remove('flex');
            document.getElementById('award-lightbox-img').src = '';
            document.body.style.overflow = '';
        }

        document.getElementById('award-lightbox').addEventListener('click', (event) => {
            if (event.target.id === 'award-lightbox') closeAwardImage();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeAwardImage();
        });
    </script>
</body>

</html>
